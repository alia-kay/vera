<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vera</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --base:       #101820;
      --surface:    #182430;
      --surface-2:  #1E2E3C;
      --amber:      #E8A030;
      --teal:       #4A8888;
      --text:       #D8C8A8;
      --text-muted: #6A8898;
      --text-dim:   #7A9AAA;
      --border:     #1E3040;
      --nav-bg:     #0C1420;
      --div-line:   #4A6880;
      --div-label:  #B8D4E0;
      --inactive:   #6A8898;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      background: var(--base);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    #app {
      position: relative;
      width: 390px;
      min-height: 100dvh;
      background: var(--base);
      overflow-x: hidden;
    }

    .content-area {
      padding-top: 72px;
      padding-bottom: 110px;
      padding-left: 24px;
      padding-right: 24px;
      overflow-y: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .content-area::-webkit-scrollbar {
      display: none;
    }

    .h-scroll {
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .h-scroll::-webkit-scrollbar {
      display: none;
    }

    .tab-content {
      animation: fadeIn 0.15s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── ONBOARDING ─── */
    .onboarding {
      width: 100%;
      min-height: 100dvh;
      background: var(--base);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .atmos-ob {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .atmos-1::before {
      content: '';
      position: absolute;
      top: -60px; left: 15%;
      width: 200px; height: 200px;
      background: radial-gradient(ellipse, rgba(232,160,48,0.08) 0%, transparent 65%);
    }
    .atmos-1::after {
      content: '';
      position: absolute;
      bottom: 60px; right: -20px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(74,136,136,0.06) 0%, transparent 70%);
    }
    .atmos-2::before {
      content: '';
      position: absolute;
      top: 30px; right: 5%;
      width: 180px; height: 180px;
      background: radial-gradient(ellipse, rgba(74,136,136,0.07) 0%, transparent 65%);
    }
    .atmos-3::before {
      content: '';
      position: absolute;
      top: -40px; left: 25%;
      width: 190px; height: 190px;
      background: radial-gradient(ellipse, rgba(232,160,48,0.07) 0%, transparent 65%);
    }
    .atmos-4::before {
      content: '';
      position: absolute;
      bottom: 80px; left: 5%;
      width: 200px; height: 200px;
      background: radial-gradient(ellipse, rgba(74,136,136,0.07) 0%, transparent 65%);
    }
    .atmos-5::before {
      content: '';
      position: absolute;
      top: 50px; right: -20px;
      width: 190px; height: 190px;
      background: radial-gradient(ellipse, rgba(232,160,48,0.06) 0%, transparent 65%);
    }
    .onboarding-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px 26px 32px;
      position: relative;
      z-index: 1;
      min-height: 0;
    }
    .ob-progress {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 36px;
      flex-shrink: 0;
    }
    .ob-prog-dot {
      width: 5px;
      height: 5px;
      border: 0.5px solid var(--text-dim);
      transform: rotate(45deg);
      flex-shrink: 0;
      background: transparent;
    }
    .ob-prog-dot.active {
      background: var(--amber);
      border-color: var(--amber);
    }
    .ob-prog-dot.done {
      background: rgba(232,160,48,0.35);
      border-color: rgba(232,160,48,0.45);
    }
    .ob-prog-line {
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }
    .ob-prog-line.done {
      background: rgba(232,160,48,0.3);
    }
    .ob-mv-orn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      flex-shrink: 0;
    }
    .ob-orn-ln { width: 28px; height: 0.5px; background: var(--border); }
    .ob-orn-dm {
      width: 5px; height: 5px;
      border: 0.5px solid var(--text-dim);
      transform: rotate(45deg);
    }
    .ob-app-name {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.44em;
      text-transform: uppercase;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .ob-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 56px;
      flex-shrink: 0;
    }
    .ob-field-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .ob-name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 17px;
      font-weight: 300;
      padding: 10px 0;
      width: 100%;
      outline: none;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .ob-name-input::placeholder { color: var(--text-dim); font-style: italic; }
    .ob-optional {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.45;
      margin-top: 5px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }
    .ob-begin-wrap {
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }
    .ob-begin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      min-width: 160px;
      min-height: 44px;
    }
    .ob-begin-ln {
      width: 24px;
      height: 0.5px;
      background: var(--amber);
      opacity: 0.7;
    }
    .ob-begin-lbl {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--amber);
    }
    .ob-q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      line-height: 1.45;
      letter-spacing: 0.01em;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .ob-q-sub {
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.65;
      margin-bottom: 18px;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .ob-textarea {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 14px 16px;
      width: 100%;
      outline: none;
      resize: none;
      height: 160px;
      line-height: 1.65;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
      display: block;
      flex-shrink: 0;
      caret-color: var(--amber);
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .ob-textarea::-webkit-scrollbar { display: none; }
    .ob-textarea::placeholder { color: var(--text-dim); font-style: italic; }
    .ob-s-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 17px;
      font-weight: 300;
      padding: 12px 0;
      width: 100%;
      outline: none;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
      display: block;
      flex-shrink: 0;
      caret-color: var(--amber);
    }
    .ob-s-input::placeholder { color: var(--text-dim); font-style: italic; }
    .ob-options {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .ob-option {
      padding: 10px 14px;
      border-radius: 8px;
      border: 0.5px solid var(--border);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      background: transparent;
      text-align: left;
      width: 100%;
      min-height: 44px;
    }
    .ob-option.selected {
      border-color: rgba(232,160,48,0.5);
      background: rgba(232,160,48,0.12);
      color: var(--amber);
    }
    .ob-nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .ob-back-btn {
      width: 36px;
      height: 36px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ob-next-btn {
      width: 36px;
      height: 36px;
      background: var(--amber);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ob-btn-spacer {
      width: 36px;
      flex-shrink: 0;
    }
    .ob-nav-row-5 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .atmos {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .atmos::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -30%;
      width: 80%;
      height: 70%;
      background: radial-gradient(ellipse at center, rgba(232, 160, 48, 0.07) 0%, transparent 70%);
    }

    .atmos::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: -20%;
      width: 70%;
      height: 60%;
      background: radial-gradient(ellipse at center, rgba(74, 136, 136, 0.06) 0%, transparent 70%);
    }

    /* ─── SHARE TAB ─── */
    .share-atmos {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 390px;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .share-atmos::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 160px;
      background: radial-gradient(ellipse, rgba(232,160,48,0.07) 0%, transparent 70%);
    }
    .share-atmos::after {
      content: '';
      position: absolute;
      bottom: 200px;
      right: -20px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(74,136,136,0.05) 0%, transparent 70%);
    }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 68px 20px 240px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
    }
    .chat::-webkit-scrollbar { width: 3px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chat { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .bubble-vera {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      max-width: 84%;
      align-self: flex-start;
    }
    .bubble-vera-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber);
      font-weight: 400;
      padding-left: 3px;
      font-family: 'Cinzel', serif;
    }
    .bubble-vera-text {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 3px 14px 14px 14px;
      padding: 13px 17px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      line-height: 1.65;
      letter-spacing: 0.01em;
    }
    .bubble-user {
      align-self: flex-end;
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .bubble-user-text {
      background: var(--surface-2);
      border: 0.5px solid rgba(232,160,48,0.18);
      border-radius: 14px 3px 14px 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.6;
      letter-spacing: 0.02em;
    }
    .bubble-user-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding-right: 3px;
    }
    .bubble-time {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .day-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }
    .day-line { flex: 1; height: 0.5px; background: var(--border); }
    .day-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 300;
      font-family: 'Cinzel', serif;
    }
    .day-diamond {
      width: 4px;
      height: 4px;
      border: 0.5px solid var(--text-dim);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .input-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 390px;
      z-index: 11;
    }
    .input-gradient {
      height: 20px;
      background: linear-gradient(to top, var(--nav-bg), transparent);
    }
    .input-wrap {
      background: var(--nav-bg);
      padding: 10px 16px 4px;
    }
    .input-inner {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 11px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-field {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.6;
      resize: none;
      width: 100%;
      min-height: 40px;
      max-height: 100px;
      letter-spacing: 0.02em;
      caret-color: var(--amber);
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .input-field::-webkit-scrollbar { display: none; }
    .input-field::placeholder { color: var(--text-dim); font-style: italic; }
    .input-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .send-btn {
      background: var(--amber);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:disabled { opacity: 0.5; cursor: default; }
    .share-nav {
      background: var(--nav-bg);
      border-top: 0.5px solid var(--border);
      padding: 12px 0 28px;
      display: flex;
      justify-content: space-around;
      margin-top: 0;
    }
    .share-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 4px 20px;
      background: none;
      border: none;
      min-height: 44px;
      justify-content: center;
    }
    .share-nav-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 400;
      font-family: 'Cinzel', serif;
    }
    .share-nav-item.active .share-nav-label { color: var(--amber); }
    .share-nav-item.inactive .share-nav-label { color: #6A8898; }

    /* ─── REMEMBER TAB ─── */
    .remember-atmos {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 390px;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .remember-atmos::before {
      content: '';
      position: absolute;
      top: -40px; left: 30%;
      width: 260px; height: 260px;
      background: radial-gradient(ellipse, rgba(74,136,136,0.08) 0%, transparent 65%);
    }
    .remember-atmos::after {
      content: '';
      position: absolute;
      bottom: 160px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(232,160,48,0.05) 0%, transparent 70%);
    }

    .remember-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 72px 0 110px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }
    .remember-scroll::-webkit-scrollbar { display: none; }
    .remember-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    .mv-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      margin: 28px 0 16px;
    }
    .mv-div-line { flex: 1; height: 1px; background: #4A6880; }
    .mv-div-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #B8D4E0;
      white-space: nowrap;
      font-weight: 400;
    }
    .mv-div-diamond {
      width: 7px; height: 7px;
      border: 1px solid #B8D4E0;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .mv-divider-amber .mv-div-line { background: rgba(232,160,48,0.5); }
    .mv-divider-amber .mv-div-diamond { border-color: #E8A030; }
    .mv-divider-amber .mv-div-label { color: #E8A030; }

    .calendar-wrap { padding: 8px 24px 0; }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-month {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }
    .cal-nav { display: flex; gap: 20px; }
    .cal-arrow { font-size: 22px; color: var(--text-dim); cursor: pointer; opacity: 0.7; padding: 4px 8px; user-select: none; }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 0 16px 0;
      justify-content: flex-start;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .vera-cursor {
      display: inline-block;
      width: 1.5px;
      height: 0.9em;
      background: var(--text-dim);
      margin-left: 2px;
      vertical-align: text-bottom;
      opacity: 0.5;
      animation: vera-blink 1.1s ease-in-out infinite;
    }
    @keyframes vera-blink {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 0; }
    }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: 24px;
      border: 0.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      min-height: 36px;
    }
    .chip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* chip dot and active colours are applied via inline styles per-pattern — see PatternChips.js */

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .day-lbl {
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding-bottom: 6px;
    }

    .c {
      aspect-ratio: 1;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 300;
      cursor: pointer;
      position: relative;
      transition: outline 0.1s;
    }
    .c.empty { cursor: default; }
    .c.future { color: var(--border); cursor: default; }

    /* ─── INTEND TAB ─── */
    .intend-atmos {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 390px; height: 100vh;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .intend-atmos::before {
      content: '';
      position: absolute;
      top: -40px; right: 20%;
      width: 200px; height: 200px;
      background: radial-gradient(ellipse, rgba(232,160,48,0.06) 0%, transparent 65%);
    }
    .intend-atmos::after {
      content: '';
      position: absolute;
      bottom: 100px; left: -20px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(74,136,136,0.05) 0%, transparent 70%);
    }

    .intend-scroll {
      flex: 1; overflow-y: auto;
      padding: 64px 0 90px;
      position: relative; z-index: 1;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .intend-scroll::-webkit-scrollbar { display: none; }

    /* ─── GROW TAB ─── */
    .grow-atmos::before { content:''; position:absolute; top:-40px; left:25%; width:260px; height:260px; background:radial-gradient(ellipse, rgba(74,136,136,0.07) 0%, transparent 65%); }
    .grow-atmos::after  { content:''; position:absolute; bottom:160px; right:-30px; width:200px; height:200px; background:radial-gradient(circle, rgba(232,160,48,0.04) 0%, transparent 70%); }

    .grow-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 72px 24px 100px;
      position: relative;
      z-index: 1;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .grow-scroll::-webkit-scrollbar { display: none; }

    /* ─── GROW V2 — suggest card ─── */
    .g2-suggest-card {
      border:0.5px solid var(--border);
      border-radius:14px;
      padding:18px 18px 16px;
      background:linear-gradient(180deg, rgba(232,160,48,0.04) 0%, transparent 100%);
      position:relative;
    }
    .g2-suggest-title-row { display:flex; justify-content:space-between; align-items:baseline; gap:14px; margin-bottom:8px; }
    .g2-suggest-type {
      font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
      color:var(--amber); padding:5px 12px; border:0.5px solid rgba(232,160,48,0.5);
      border-radius:20px; background:rgba(232,160,48,0.1); white-space:nowrap; flex-shrink:0;
      align-self:flex-start;
    }
    .g2-suggest-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; font-style:italic; color:var(--text); line-height:1.4; flex:1; }
    .g2-suggest-author { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.18em; color:var(--text-dim); text-transform:uppercase; margin-bottom:14px; }
    .g2-suggest-why { font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:300; font-style:italic; color:var(--text-muted); line-height:1.6; margin-bottom:18px; }
    .g2-suggest-actions { display:flex; gap:10px; margin-top:14px; padding:0 4px; }
    .g2-act-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
      padding:11px 12px; background:transparent;
      border:0.5px solid var(--border); border-radius:8px;
      font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.18em; text-transform:uppercase;
      color:var(--text-dim); cursor:pointer;
    }
    .g2-act-btn:hover { color:var(--text); border-color:var(--text-dim); }
    .g2-act-btn.primary { color:var(--amber); border-color:rgba(232,160,48,0.45); background:rgba(232,160,48,0.08); }
    .g2-act-btn.primary:hover { background:rgba(232,160,48,0.14); }
    .g2-act-icon { width:11px; height:11px; flex-shrink:0; }

    /* ─── GROW V2 — path / list ─── */
    .g2-path-cta {
      display:flex; align-items:center; gap:14px;
      padding:14px 16px; margin-bottom:16px;
      border:0.5px dashed rgba(232,160,48,0.45);
      border-radius:10px; background:rgba(232,160,48,0.04);
      cursor:pointer;
    }
    .g2-path-cta-diamond { width:18px; height:18px; border:1px solid var(--amber); transform:rotate(45deg); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .g2-path-cta-diamond::after { content:'+'; transform:rotate(-45deg); font-size:13px; color:var(--amber); font-weight:300; line-height:1; }
    .g2-path-cta-text { display:flex; flex-direction:column; gap:2px; }
    .g2-path-cta-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--amber); }
    .g2-path-cta-sub { font-family:'Cormorant Garamond',serif; font-size:13px; font-style:italic; color:var(--text-muted); }

    .g2-path-section-label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--text-dim); margin:14px 0 4px; opacity:0.7; }
    .g2-path-section-label:first-of-type { margin-top:6px; }

    .g2-path-item { display:flex; gap:12px; padding:14px 0; border-bottom:0.5px solid var(--border); align-items:flex-start; }
    .g2-path-item:last-child { border-bottom:none; }
    .g2-path-marker { width:7px; height:7px; transform:rotate(45deg); border:0.5px solid var(--amber); margin-top:6px; flex-shrink:0; }
    .g2-path-item.upcoming .g2-path-marker { background:transparent; border-color:var(--text-dim); }
    .g2-path-item.past .g2-path-marker { background:var(--amber); border-color:var(--amber); }
    .g2-path-body { flex:1; min-width:0; }
    .g2-path-row1 { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:4px; }
    .g2-path-title { font-size:15px; font-weight:400; color:var(--text); letter-spacing:0.02em; line-height:1.4; }
    .g2-path-type {
      font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.14em; text-transform:uppercase;
      color:var(--text-dim); padding:3px 9px; border:0.5px solid var(--border); border-radius:20px;
      white-space:nowrap; flex-shrink:0; margin-top:2px;
    }
    .g2-path-meta { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); opacity:0.7; }

    .g2-path-more { display:none; flex-direction:column; }
    .g2-path-more.open { display:flex; }
    .g2-path-toggle {
      display:flex; align-items:center; gap:12px;
      background:transparent; border:none; cursor:pointer;
      padding:14px 0 4px; width:100%;
    }
    .g2-path-toggle-line { flex:1; height:0.5px; background:var(--border); }
    .g2-path-toggle-label {
      font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.2em;
      text-transform:uppercase; color:var(--text-dim);
    }
    .g2-path-toggle:hover .g2-path-toggle-label { color:var(--amber); }
    .g2-path-toggle:hover .g2-path-toggle-line { background:rgba(232,160,48,0.4); }

    /* ─── GROW — obs classes (used by GrowNoticesCard) ─── */
    .obs-diamond-row { display:flex; align-items:flex-start; gap:12px; }
    .obs-diamond { width:5px; height:5px; border:0.5px solid var(--teal); transform:rotate(45deg); flex-shrink:0; margin-top:8px; }
    .obs-text { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:300; font-style:italic; color:var(--text); line-height:1.55; }
    .obs-date { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); padding-left:17px; }

    /* ─── VERA NOTICES CARD ─── */
    .g2-notices-card {
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(74,136,136,0.06) 0%, transparent 100%);
      margin-bottom: 4px;
    }
    .g2-notices-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 10px;
      opacity: 0.8;
    }
    .g2-notices-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      line-height: 1.6;
      letter-spacing: 0.01em;
    }
    .g2-notices-date {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.6;
      margin-top: 10px;
    }

    /* ─── INLINE ADD FORM ─── */
    .g2-add-form {
      border: 0.5px dashed rgba(232,160,48,0.35);
      border-radius: 10px;
      padding: 16px;
      background: rgba(232,160,48,0.03);
      margin-bottom: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .g2-add-input {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Jost', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }
    .g2-add-input::placeholder { color: var(--text-dim); font-style: italic; }
    .g2-type-pills { display:flex; gap:6px; flex-wrap:wrap; }
    .g2-type-pill {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .g2-type-pill.selected {
      border-color: rgba(232,160,48,0.5);
      background: rgba(232,160,48,0.1);
      color: var(--amber);
    }
    .g2-add-actions { display:flex; gap:8px; }
    .g2-add-actions .simple-btn { flex:1; width:auto; }
    .simple-btn-amber {
      color: var(--amber);
      border-color: rgba(232,160,48,0.45);
      background: rgba(232,160,48,0.08);
    }

    /* ─── SWIPE TO DONE ─── */
    .g2-swipe-wrapper {
      position: relative;
      overflow: hidden;
      border-bottom: 0.5px solid var(--border);
    }
    .g2-swipe-wrapper:last-child { border-bottom: none; }
    .g2-swipe-action {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 80px;
      background: rgba(232,160,48,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .g2-swipe-action-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber);
    }
    .g2-swipe-item {
      position: relative;
      background: var(--base);
      transition: transform 0.2s ease;
      touch-action: pan-y;
    }
    .g2-swipe-item.swiped { transform: translateX(-80px); }
    .g2-swipe-item .g2-path-item { border-bottom: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
